<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/proxy/dashboard/">
  <title>Proxy Monitor — Ollama Smart Proxy</title>
  <link rel="stylesheet" href="app.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>Proxy Monitor</h1>
    <div class="auth">
      <input type="password" id="adminKey" placeholder="Admin key (or use ?key= in URL)" />
      <button id="setKey">Set key</button>
      <span id="authStatus"></span>
    </div>
  </header>
  <nav class="tabs">
    <button data-tab="home">Home</button>
    <button data-tab="conversations">Conversations</button>
    <button data-tab="history">Request History</button>
  </nav>
  <main>
    <section id="home" class="tab-panel">
      <div class="home-controls">
        <button id="loadHome">Refresh</button>
        <span id="homeWsStatus" class="home-ws-status" title="WebSocket connection for live updates"></span>
        <label>Hours <select id="homeHours"><option value="24">24h</option><option value="72" selected>72h</option><option value="168">7d</option></select></label>
        <span id="homeLastUpdated" class="home-last-updated"></span>
      </div>
      <div class="home-grid">
        <div class="home-col home-col-left">
          <div class="dash-card dash-card-health" data-card="health">
            <div class="dash-card-title">Health</div>
            <div class="dash-card-body" id="homeHealth"></div>
          </div>
          <div class="dash-card dash-card-vram" data-card="vram">
            <div class="dash-card-title">VRAM</div>
            <div class="dash-card-body" id="homeVram"></div>
          </div>
          <div class="dash-card dash-card-recent" data-card="recent">
            <div class="dash-card-title">Recent</div>
            <div class="dash-card-body" id="homeRecent"></div>
          </div>
          <div class="dash-card dash-card-queue" data-card="queue">
            <div class="dash-card-title">Queue</div>
            <div class="dash-card-body" id="homeQueue"></div>
          </div>
        </div>
        <div class="home-col home-col-middle">
          <div class="dash-card dash-card-models" data-card="topModels">
            <div class="dash-card-title">Top Models</div>
            <div class="dash-card-body" id="homeTopModels"></div>
          </div>
          <div class="dash-card dash-card-perf-model" data-card="perfModel">
            <div class="dash-card-title">Avg Perf (Model)</div>
            <div class="dash-card-body" id="homePerfModel"></div>
          </div>
          <div class="dash-card dash-card-errors-model" data-card="errorsModel">
            <div class="dash-card-title">Errors by Model</div>
            <div class="dash-card-body" id="homeErrorsModel"></div>
          </div>
        </div>
        <div class="home-col home-col-right">
          <div class="dash-card dash-card-ips" data-card="topIps">
            <div class="dash-card-title">Top IPs</div>
            <div class="dash-card-body" id="homeTopIps"></div>
          </div>
          <div class="dash-card dash-card-perf-ip" data-card="perfIp">
            <div class="dash-card-title">Avg Perf (IP)</div>
            <div class="dash-card-body" id="homePerfIp"></div>
          </div>
          <div class="dash-card dash-card-errors-ip" data-card="errorsIp">
            <div class="dash-card-title">Errors by IP</div>
            <div class="dash-card-body" id="homeErrorsIp"></div>
          </div>
        </div>
      </div>
    </section>
    <section id="conversations" class="tab-panel hidden">
      <div class="conv-controls">
        <button id="loadSessions">Refresh</button>
        <label>Limit <input type="number" id="convLimit" value="100" min="1" max="1000" /></label>
        <span class="conv-live-controls">
          <button id="connectWs">Go live</button>
          <button id="disconnectWs" class="hidden">Stop live</button>
          <span id="wsStatus"></span>
        </span>
      </div>
      <div id="sessionList" class="session-list"></div>
      <div id="sessionThread" class="session-thread hidden">
        <button id="backToSessions" class="back-btn">&larr; Back to sessions</button>
        <h3 id="sessionTitle">Conversation</h3>
        <div id="threadMessages"></div>
      </div>
    </section>
    <section id="history" class="tab-panel hidden">
      <div class="filters">
        <label>Limit <input type="number" id="limit" value="100" min="1" max="1000" /></label>
        <label>Status <select id="filterStatus"><option value="">All</option><option value="completed">Completed</option><option value="error">Error</option><option value="processing">Processing</option><option value="queued">Queued</option><option value="failed">Failed</option></select></label>
        <label>Model <input type="text" id="filterModel" placeholder="partial match" /></label>
        <label>IP <input type="text" id="filterIp" placeholder="exact or 10.200.* for partial" /></label>
        <button id="loadHistory">Load</button>
      </div>
      <div class="table-wrap">
        <table id="historyTable">
          <thead>
            <tr>
              <th>Request ID</th>
              <th>Time</th>
              <th>Model</th>
              <th>IP</th>
              <th>Status</th>
              <th>Duration</th>
              <th>Queue wait</th>
              <th>Processing</th>
              <th>Session</th>
              <th>Endpoint</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <div id="detailModal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="closeDetail">&times;</button>
      <div class="detail-meta"></div>
      <div class="detail-tabs">
        <button data-detail="text" class="active">Request / Response</button>
        <button data-detail="raw">Raw JSON</button>
      </div>
      <pre id="detailText" class="detail-body"></pre>
      <pre id="detailRaw" class="detail-body hidden"></pre>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
